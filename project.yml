name: ReminderHeatmap
options:
  bundleIdPrefix: com.addobari
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    DEVELOPMENT_TEAM: 34J9QWJCFP

targets:
  ReminderHeatmap:
    type: application
    platform: macOS
    sources:
      - path: ReminderHeatmap
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: ReminderHeatmap/Info.plist
        CODE_SIGN_ENTITLEMENTS: ReminderHeatmap/ReminderHeatmap.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.addobari.reminderheatmap
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSRemindersUsageDescription: "ReminderHeatmap needs access to your reminders to display your completion history."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: Plotted
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: ReminderHeatmapWidgetExtension

  ReminderHeatmapWidgetExtension:
    type: app-extension
    platform: macOS
    product: ReminderHeatmapWidgetExtension
    sources:
      - path: ReminderHeatmapWidget
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: ReminderHeatmapWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: ReminderHeatmapWidget/ReminderHeatmapWidgetExtension.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.addobari.reminderheatmap.widget
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSRemindersUsageDescription: "ReminderHeatmap needs access to your reminders to display your completion history."
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        CODE_SIGN_STYLE: Automatic
